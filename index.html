<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Waitless — Real-time Clinic Token Tracking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <!-- QR Code generator — no API key needed, runs fully in browser -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0a0c10; --bg2:#111318; --bg3:#1a1d24;
      --border:rgba(255,255,255,0.08); --text:#f0f2f7; --muted:#7a7f91;
      --green:#00e676; --red:#ff1744; --yellow:#ffd600; --blue:#40c4ff;
      --font-display:'Syne',sans-serif; --font-body:'DM Sans',sans-serif; --radius:16px;
    }
    html,body { background:var(--bg); color:var(--text); font-family:var(--font-body); line-height:1.6; min-height:100vh; }
    #root { min-height:100vh; }

    /* ── NAV ── */
    .nav { display:flex; align-items:center; justify-content:space-between; padding:16px 32px; border-bottom:1px solid var(--border); backdrop-filter:blur(12px); position:sticky; top:0; z-index:100; background:rgba(10,12,16,0.93); }
    .nav-left { display:flex; align-items:center; gap:16px; }
    .nav-brand { font-family:var(--font-display); font-weight:800; font-size:22px; letter-spacing:-0.5px; background:linear-gradient(135deg,#fff 30%,var(--green)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .nav-actions { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .nav-user { font-size:13px; color:var(--muted); max-width:130px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .nav-right-note { font-size:13px; color:var(--green); font-weight:500; }

    /* ── BUTTONS ── */
    button { cursor:pointer; border:none; font-family:var(--font-body); font-size:14px; transition:all .18s; }
    .btn-primary { background:var(--green); color:#000; font-weight:700; padding:10px 22px; border-radius:10px; }
    .btn-primary:hover { background:#00ff87; transform:translateY(-1px); }
    .btn-primary:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    .btn-outline { background:transparent; color:var(--text); font-weight:600; padding:10px 22px; border-radius:10px; border:1.5px solid var(--border); }
    .btn-outline:hover { border-color:var(--green); color:var(--green); }
    .btn-ghost { background:transparent; color:var(--muted); padding:8px 14px; border-radius:8px; }
    .btn-ghost:hover { color:var(--text); background:var(--bg3); }
    .btn-google { display:inline-flex; align-items:center; gap:8px; background:#fff; color:#111; font-weight:600; padding:10px 18px; border-radius:10px; }
    .btn-google:hover { background:#f0f0f0; transform:translateY(-1px); }
    .btn-lg { padding:14px 32px; font-size:16px; border-radius:12px; }
    .btn-red { background:rgba(255,23,68,0.12); color:var(--red); font-weight:700; padding:10px 20px; border-radius:10px; border:1px solid rgba(255,23,68,0.3); white-space:nowrap; }
    .btn-red:hover { background:rgba(255,23,68,0.25); }

    /* ── INPUTS ── */
    label { display:flex; flex-direction:column; gap:8px; font-size:14px; font-weight:500; color:var(--muted); }
    .inp { background:var(--bg3); border:1px solid var(--border); color:var(--text); border-radius:10px; padding:12px 16px; font-size:15px; font-family:var(--font-body); outline:none; transition:border-color .18s; width:100%; }
    .inp:focus { border-color:var(--green); }
    .inp::placeholder { color:#555; }

    /* ── HERO ── */
    .hero { text-align:center; padding:100px 24px 80px; background:radial-gradient(ellipse at 50% 0%,rgba(0,230,118,0.08) 0%,transparent 65%); }
    .hero-pill { display:inline-block; padding:6px 18px; border-radius:100px; background:rgba(0,230,118,0.12); color:var(--green); font-size:13px; font-weight:600; letter-spacing:.5px; margin-bottom:24px; }
    .hero-title { font-family:var(--font-display); font-size:clamp(48px,8vw,96px); font-weight:800; line-height:1; margin-bottom:24px; letter-spacing:-2px; }
    .accent { color:var(--green); }
    .hero-sub { font-size:18px; color:var(--muted); max-width:500px; margin:0 auto 40px; }
    .hero-cta { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; }

    /* ── FEATURES ── */
    .features { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:24px; padding:60px 32px; border-top:1px solid var(--border); max-width:1100px; margin:0 auto; }
    .feature { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:28px; }
    .feature-icon { font-size:32px; margin-bottom:12px; }
    .feature h3 { font-family:var(--font-display); font-size:18px; margin-bottom:8px; }
    .feature p { color:var(--muted); font-size:14px; }

    /* ── CLINICS PREVIEW (home) ── */
    .clinics-preview { padding:40px 32px; max-width:1100px; margin:0 auto; }
    .section-title { font-family:var(--font-display); font-size:24px; margin-bottom:24px; font-weight:700; }
    .clinic-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:20px; }
    .clinic-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:24px; cursor:pointer; transition:all .2s; border-top:3px solid var(--accent,var(--green)); }
    .clinic-card:hover { transform:translateY(-3px); }
    .clinic-card-status { display:inline-block; padding:4px 12px; border-radius:100px; font-size:12px; font-weight:600; margin-bottom:12px; }
    .clinic-card-name { font-weight:600; font-size:16px; margin-bottom:2px; }
    .clinic-card-title { color:var(--muted); font-size:14px; margin-bottom:16px; }
    .clinic-card-token { display:flex; align-items:center; gap:12px; }
    .token-label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
    .token-num { font-family:var(--font-display); font-size:36px; font-weight:800; color:var(--accent,var(--green)); }

    /* ── FOOTER ── */
    .footer { display:flex; justify-content:space-between; align-items:center; padding:24px 32px; border-top:1px solid var(--border); color:var(--muted); font-size:13px; margin-top:20px; }

    /* ── AVATAR ── */
    .avatar { width:32px; height:32px; border-radius:50%; object-fit:cover; flex-shrink:0; }

    /* ════════════════════════════════════════════════════
       DOCTOR PANEL — TAB LAYOUT  (mobile-first)
    ════════════════════════════════════════════════════ */
    .doctor-panel { min-height:100vh; display:flex; flex-direction:column; }

    /* Sticky tab bar */
    .panel-tabs {
      display:flex; border-bottom:1px solid var(--border);
      background:var(--bg2); padding:0 16px;
      position:sticky; top:57px; z-index:90;
      overflow-x:auto; -webkit-overflow-scrolling:touch;
    }
    .panel-tab {
      padding:14px 16px; font-family:var(--font-display); font-size:13px;
      font-weight:700; color:var(--muted); border-bottom:3px solid transparent;
      cursor:pointer; background:transparent; letter-spacing:.3px;
      transition:all .18s; white-space:nowrap; flex-shrink:0;
    }
    .panel-tab:hover { color:var(--text); }
    .panel-tab.active { color:var(--green); border-bottom-color:var(--green); }
    .tab-badge {
      display:inline-flex; align-items:center; justify-content:center;
      background:var(--green); color:#000; font-size:10px; font-weight:800;
      width:18px; height:18px; border-radius:50%; margin-left:6px; vertical-align:middle;
    }
    .tab-content { display:none; flex:1; }
    .tab-content.active { display:block; }

    /* ── TAB 1: My Session ── */
    .my-session-body { max-width:640px; margin:0 auto; padding:28px 16px 80px; }
    .my-session-heading { font-family:var(--font-display); font-size:24px; font-weight:800; margin-bottom:6px; }
    .my-session-sub { color:var(--muted); font-size:14px; margin-bottom:24px; }

    .create-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:24px 20px; }
    .create-card h3 { font-family:var(--font-display); font-size:18px; margin-bottom:6px; }
    .create-sub { color:var(--muted); font-size:13px; margin-bottom:22px; }
    .form-grid { display:grid; grid-template-columns:1fr; gap:16px; margin-bottom:22px; }
    .create-btn { width:100%; display:block; text-align:center; }

    /* Active session summary */
    .active-session-card {
      background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius);
      padding:20px; display:flex; flex-direction:column; gap:16px;
    }
    .asc-left { flex:1; }
    .asc-label { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:4px; }
    .asc-title { font-family:var(--font-display); font-size:20px; font-weight:700; margin-bottom:6px; }
    .asc-meta { font-size:13px; color:var(--muted); margin-bottom:10px; }
    .asc-token { text-align:center; background:var(--bg3); border-radius:12px; padding:14px 20px; align-self:flex-start; }
    .asc-token-label { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); }
    .asc-token-num { font-family:var(--font-display); font-size:44px; font-weight:800; line-height:1; }
    .asc-token-of { font-size:12px; color:var(--muted); margin-top:2px; }
    .asc-actions { display:flex; gap:10px; flex-wrap:wrap; }
    .btn-go-operate {
      flex:1; background:var(--green); color:#000; font-weight:800;
      padding:12px 16px; border-radius:12px; font-size:14px;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn-go-operate:hover { background:#00ff87; }
    .broadcast-preview {
      background:rgba(255,214,0,0.07); border:1px solid rgba(255,214,0,0.18);
      border-radius:12px; padding:12px 16px; font-size:14px; color:#ffe082;
      display:flex; gap:10px; align-items:flex-start; word-break:break-word;
    }

    /* ════════════════════════════════════════════════════
       TAB 2: OPERATING APPOINTMENTS  (mobile-first)
    ════════════════════════════════════════════════════ */
    .op-body {
      max-width:640px; margin:0 auto;
      padding:20px 16px 80px;
      display:flex; flex-direction:column; gap:16px;
    }

    /* Top info bar */
    .op-topbar {
      display:flex; align-items:flex-start; justify-content:space-between;
      background:var(--bg2); border:1px solid var(--border);
      border-radius:var(--radius); padding:16px 18px; gap:12px;
    }
    .op-topbar-info { flex:1; min-width:0; }
    .op-session-name {
      font-family:var(--font-display); font-size:17px; font-weight:700;
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    .op-session-meta { font-size:12px; color:var(--muted); margin-top:2px; }
    .op-live-badge {
      display:inline-flex; align-items:center; gap:6px;
      padding:5px 12px; border-radius:100px; font-size:12px; font-weight:700;
      white-space:nowrap; flex-shrink:0;
    }
    .op-live-dot { width:6px; height:6px; border-radius:50%; animation:pulse-anim 1.5s infinite; flex-shrink:0; }

    /* Token hero — holds number AND nav buttons */
    .op-token-hero {
      background:var(--bg2); border:1px solid var(--border);
      border-radius:var(--radius); padding:28px 20px 24px;
      text-align:center; position:relative; overflow:hidden;
    }
    .op-token-hero::before {
      content:''; position:absolute; inset:0;
      background:radial-gradient(ellipse at 50% 0%,rgba(0,230,118,0.06) 0%,transparent 70%);
      pointer-events:none;
    }
    .op-token-eyebrow {
      font-size:11px; text-transform:uppercase; letter-spacing:2px;
      color:var(--muted); margin-bottom:8px;
    }
    .op-token-num {
      font-family:var(--font-display);
      font-size:clamp(72px,22vw,120px);
      font-weight:800; line-height:1; transition:color .3s;
    }
    .op-token-denom { color:var(--muted); font-size:14px; margin:8px 0 18px; }
    .op-progress-track {
      height:7px; background:var(--bg3); border-radius:4px;
      overflow:hidden; max-width:320px; margin:0 auto 8px;
    }
    .op-progress-fill { height:100%; border-radius:4px; transition:width .5s ease; }
    .op-progress-pct { font-size:12px; color:var(--muted); }

    /* Token nav — inside the hero card */
    .op-token-nav { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .op-nav-btn {
      padding:16px 12px; border-radius:12px; font-weight:800; font-size:15px;
      border:2px solid var(--border); background:var(--bg3); color:var(--text);
      display:flex; align-items:center; justify-content:center; gap:6px;
      transition:all .18s;
    }
    .op-nav-btn:hover:not(:disabled) { border-color:var(--green); color:var(--green); }
    .op-nav-btn:disabled { opacity:.3; cursor:not-allowed; }
    .op-nav-next { border-color:rgba(0,230,118,0.4); color:var(--green); background:rgba(0,230,118,0.04); }

    /* Cooldown timer */
    .token-cooldown-row {
      display:none; align-items:center; justify-content:center; gap:8px;
      background:rgba(255,214,0,0.07); border:1px solid rgba(255,214,0,0.2);
      border-radius:10px; padding:10px 16px; font-size:14px; color:#ffe082;
    }
    .cd-icon { font-size:16px; }
    .token-cooldown-row strong { font-family:var(--font-display); font-size:16px; }

    /* Section labels */
    .op-section-label {
      font-family:var(--font-display); font-size:11px; font-weight:700;
      text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:12px;
    }

    /* Main control panel */
    .op-control-panel {
      background:var(--bg2); border:1px solid var(--border);
      border-radius:var(--radius); padding:20px 18px;
    }
    .op-ctrl-section-label {
      font-family:var(--font-display); font-size:11px; font-weight:700;
      text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:12px;
    }

    /* 2-col on mobile, stays 2-col */
    .op-main-controls { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

    .op-ctrl-btn {
      display:flex; align-items:center; gap:10px;
      padding:14px 12px; border-radius:12px;
      border:2px solid var(--border); background:rgba(255,255,255,0.03);
      color:var(--text); text-align:left; transition:all .18s;
      cursor:pointer; font-family:var(--font-body);
    }
    .op-ctrl-btn:hover:not(:disabled) { transform:translateY(-1px); opacity:.9; }
    .op-ctrl-btn:disabled { opacity:.3; cursor:not-allowed; }
    .op-ctrl-icon { font-size:20px; flex-shrink:0; }
    .op-ctrl-text { display:flex; flex-direction:column; min-width:0; }
    .op-ctrl-name { font-size:14px; font-weight:800; line-height:1.2; }
    .op-ctrl-desc { font-size:11px; color:var(--muted); margin-top:2px; font-weight:400; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .op-ctrl-start     { border-color:rgba(0,230,118,0.5); background:rgba(0,230,118,0.05); }
    .op-ctrl-start .op-ctrl-name { color:var(--green); }
    .op-ctrl-stop      { border-color:rgba(64,196,255,0.4); }
    .op-ctrl-stop .op-ctrl-name { color:var(--blue); }
    .op-ctrl-emergency { border-color:rgba(255,23,68,0.35); }
    .op-ctrl-emergency .op-ctrl-name { color:var(--red); }
    .op-ctrl-nopat     { border-color:rgba(255,214,0,0.35); }
    .op-ctrl-nopat .op-ctrl-name { color:var(--yellow); }
    .op-ctrl-end       { border-color:rgba(255,23,68,0.25); }
    .op-ctrl-end .op-ctrl-name { color:var(--red); }
    .op-ctrl-active    { background:rgba(128,128,128,0.1); }

    /* Emergency / stopped banners */
    .op-continue-banner {
      background:rgba(0,230,118,0.07); border:2px solid var(--green);
      border-radius:12px; padding:16px; display:flex;
      align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
    }
    .op-continue-title { font-weight:700; font-size:14px; color:var(--green); }
    .op-continue-desc  { font-size:12px; color:var(--muted); margin-top:2px; }
    .btn-continue-op {
      background:var(--green); color:#000; font-weight:800;
      padding:11px 20px; border-radius:10px; font-size:13px; white-space:nowrap;
    }
    .btn-continue-op:hover { background:#00ff87; }
    .op-stopped-banner {
      background:rgba(64,196,255,0.07); border:1.5px solid rgba(64,196,255,0.3);
      border-radius:12px; padding:14px 16px;
    }
    .op-stopped-text { font-weight:700; font-size:14px; color:var(--blue); margin-bottom:3px; }
    .op-stopped-desc { font-size:12px; color:var(--muted); }

    /* Instruction box */
    .op-instr-box {
      background:var(--bg2); border:1px solid var(--border);
      border-radius:var(--radius); padding:20px 18px;
    }
    .op-instr-row { display:flex; gap:10px; }
    .op-instr-row .inp { flex:1; width:auto; }
    .op-current-instr {
      margin-top:12px; padding:10px 14px;
      background:rgba(255,214,0,0.06); border:1px solid rgba(255,214,0,0.15);
      border-radius:10px; font-size:13px; color:#ffe082;
      display:flex; gap:8px; align-items:flex-start; word-break:break-word;
    }

    /* Danger zone */
    .op-danger {
      background:rgba(255,23,68,0.04); border:1px solid rgba(255,23,68,0.18);
      border-radius:var(--radius); padding:18px;
      display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
    }
    .op-danger h4 { font-family:var(--font-display); font-size:15px; font-weight:700; color:var(--red); margin-bottom:3px; }
    .op-danger p  { font-size:12px; color:var(--muted); }

    /* No session placeholder */
    .op-empty { text-align:center; padding:60px 20px; }
    .op-empty-icon { font-size:52px; margin-bottom:14px; }
    .op-empty h3 { font-family:var(--font-display); font-size:20px; margin-bottom:8px; }
    .op-empty p  { color:var(--muted); font-size:14px; margin-bottom:20px; }

    /* Debug row */
    .op-debug-row {
      display:flex; align-items:center; gap:8px;
      background:var(--bg3); border-radius:10px;
      padding:8px 14px; font-size:12px; flex-wrap:wrap;
    }
    .op-debug-label { color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
    .op-debug-val { color:var(--text); font-family:monospace; font-size:11px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
    .op-debug-test { background:var(--bg2); color:var(--muted); border:1px solid var(--border); padding:4px 10px; border-radius:8px; font-size:11px; flex-shrink:0; }
    .op-debug-test:hover { color:var(--green); border-color:var(--green); }

    /* ════════════════════════════════════════════════════
       TAB 3: MY APPOINTMENTS HISTORY
    ════════════════════════════════════════════════════ */
    .hist-body { max-width:640px; margin:0 auto; padding:28px 16px 80px; }
    .hist-heading { font-family:var(--font-display); font-size:24px; font-weight:800; margin-bottom:6px; }
    .hist-sub { color:var(--muted); font-size:13px; margin-bottom:24px; }
    .hist-list { display:flex; flex-direction:column; gap:14px; }
    .hist-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:18px; transition:all .2s; }
    .hist-card-active { border-left:4px solid var(--green); }
    .hist-card-ended  { border-left:4px solid var(--bg3); opacity:.8; }
    .hist-card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:16px; }
    .hist-card-title { font-family:var(--font-display); font-size:16px; font-weight:700; margin-bottom:3px; }
    .hist-card-meta  { font-size:12px; color:var(--muted); }
    .hist-badge-active { background:rgba(0,230,118,0.12); color:var(--green); padding:4px 12px; border-radius:100px; font-size:12px; font-weight:700; white-space:nowrap; flex-shrink:0; }
    .hist-badge-ended  { background:var(--bg3); color:var(--muted); padding:4px 12px; border-radius:100px; font-size:12px; font-weight:600; white-space:nowrap; flex-shrink:0; }
    .hist-card-stats { display:flex; gap:20px; flex-wrap:wrap; margin-bottom:14px; }
    .hist-stat { text-align:center; }
    .hist-stat-val { font-family:var(--font-display); font-size:24px; font-weight:800; line-height:1; }
    .hist-stat-lbl { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-top:3px; }
    .hist-card-actions { padding-top:12px; border-top:1px solid var(--border); }

    /* ── NOT STARTED / START SERVING BANNER ── */
    .op-start-banner {
      background:rgba(158,158,158,0.07); border:2px solid rgba(158,158,158,0.3);
      border-radius:var(--radius); padding:20px;
      display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
    }
    .op-start-title { font-family:var(--font-display); font-size:16px; font-weight:700; margin-bottom:4px; }
    .op-start-desc  { font-size:12px; color:var(--muted); }
    .btn-start-serving {
      background:var(--green); color:#000; font-weight:800;
      padding:14px 28px; border-radius:12px; font-size:15px; white-space:nowrap;
      box-shadow:0 4px 20px rgba(0,230,118,0.25); transition:all .2s; flex-shrink:0;
    }
    .btn-start-serving:hover { background:#00ff87; transform:translateY(-1px); }

    /* ════════════════════════════════════════════════════
       PUBLIC BOARD
    ════════════════════════════════════════════════════ */    /* ════════════════════════════════════════════════════
       PUBLIC BOARD
    ════════════════════════════════════════════════════ */
    .public-board { min-height:100vh; }
    .board-body { max-width:1000px; margin:0 auto; padding:48px 24px; }
    .board-title { font-family:var(--font-display); font-size:32px; font-weight:800; margin-bottom:24px; }

    /* Search */
    .search-wrap { position:relative; margin-bottom:28px; }
    .search-icon-el { position:absolute; left:16px; top:50%; transform:translateY(-50%); font-size:16px; pointer-events:none; }
    .search-inp { width:100%; background:var(--bg2); border:1px solid var(--border); color:var(--text); border-radius:12px; padding:14px 44px; font-size:15px; font-family:var(--font-body); outline:none; transition:border-color .18s; }
    .search-inp:focus { border-color:var(--green); }
    .search-inp::placeholder { color:#555; }
    .search-clear { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:var(--bg3); border:none; color:var(--muted); width:26px; height:26px; border-radius:50%; font-size:14px; cursor:pointer; display:none; align-items:center; justify-content:center; }
    .search-clear.show { display:flex; }

    /* Pub cards */
    .board-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; }
    .pub-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); cursor:pointer; overflow:hidden; transition:all .2s; border-left:4px solid var(--accent,var(--green)); }
    .pub-card:hover { transform:translateY(-3px); box-shadow:0 12px 40px rgba(0,0,0,0.4); }
    .pub-card-inner { display:flex; align-items:center; gap:16px; padding:24px; }
    .pub-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
    .pub-info { flex:1; min-width:0; }
    .pub-doctor { font-weight:700; font-size:16px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .pub-title-txt { color:var(--muted); font-size:13px; margin-bottom:6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .pub-status-lbl { font-size:13px; font-weight:600; }
    .pub-token-badge { text-align:center; flex-shrink:0; }
    .pub-token-n { font-family:var(--font-display); font-size:48px; font-weight:800; line-height:1; }
    .pub-token-l { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); }
    .pub-card-foot { padding:10px 24px; border-top:1px solid var(--border); font-size:12px; color:var(--muted); text-align:right; }

    /* Empty state */
    .empty-state { text-align:center; padding:80px 24px; }
    .empty-icon { font-size:64px; margin-bottom:20px; }
    .empty-state p { font-size:20px; font-weight:600; margin-bottom:8px; }
    .empty-state span { color:var(--muted); font-size:15px; display:block; }

    /* ════════════════════════════════════════════════════
       LIVE TOKEN VIEW
    ════════════════════════════════════════════════════ */
    .live-view { max-width:600px; margin:0 auto; padding:32px 24px; }
    .live-card { background:var(--bg2); border:1px solid var(--border); border-radius:24px; padding:36px 28px; display:flex; flex-direction:column; gap:24px; }
    .live-dr-row { display:flex; align-items:center; gap:16px; }
    .live-avatar { width:52px; height:52px; border-radius:50%; object-fit:cover; }
    .live-dr-name { font-family:var(--font-display); font-size:20px; font-weight:700; }
    .live-session-lbl { color:var(--muted); font-size:14px; }
    .live-status-banner { display:flex; align-items:center; gap:12px; padding:14px 20px; border-radius:12px; font-size:15px; flex-wrap:wrap; }
    .live-status-icon { font-size:20px; flex-shrink:0; }
    .blink { animation:blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }
    .live-token-main { text-align:center; padding:16px 0; }
    .live-token-eyebrow { font-size:13px; text-transform:uppercase; letter-spacing:2px; color:var(--muted); margin-bottom:8px; }
    .live-token-number { font-family:var(--font-display); font-size:clamp(80px,22vw,130px); font-weight:800; line-height:1; }
    .live-token-of { color:var(--muted); font-size:16px; margin-top:8px; }
    .progress-bar { height:6px; background:var(--bg3); border-radius:3px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:3px; transition:width .6s ease; }
    .progress-lbl { font-size:12px; color:var(--muted); margin-top:8px; text-align:right; }
    .live-instr { display:flex; align-items:flex-start; gap:12px; background:rgba(255,214,0,0.08); border:1px solid rgba(255,214,0,0.2); border-radius:12px; padding:16px; font-size:15px; color:#ffe082; word-break:break-word; }
    .inst-icon { font-size:20px; flex-shrink:0; }
    .live-meta { font-size:13px; color:var(--muted); text-align:center; }
    .live-pulse-note { display:flex; align-items:center; gap:10px; font-size:13px; color:var(--muted); justify-content:center; }
    .pulse-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; animation:pulse-anim 2s infinite; }
    @keyframes pulse-anim { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)} }

    /* Share row */
    .share-row { display:flex; gap:10px; }
    .btn-share, .btn-copy { flex:1; display:flex; align-items:center; justify-content:center; gap:8px; background:var(--bg3); color:var(--text); font-weight:600; padding:13px; border-radius:12px; border:1.5px solid var(--border); font-size:14px; }
    .btn-share:hover { border-color:var(--green); color:var(--green); }
    .btn-copy:hover  { border-color:var(--blue);  color:var(--blue);  }

    /* ── MAIN CONTROL PANEL ── */
    .op-control-panel { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:28px; }
    .op-ctrl-section-label { font-family:var(--font-display); font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:14px; }

    /* Control buttons grid */
    .op-main-controls { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media(max-width:560px){ .op-main-controls{ grid-template-columns:1fr; } }

    .op-ctrl-btn {
      display:flex; align-items:center; gap:14px;
      padding:18px 16px; border-radius:14px;
      border:2px solid var(--border); background:rgba(255,255,255,0.03);
      color:var(--text); text-align:left; transition:all .18s; cursor:pointer; font-family:var(--font-body);
    }
    .op-ctrl-btn:hover:not(:disabled) { transform:translateY(-1px); opacity:.9; }
    .op-ctrl-btn:disabled { opacity:.3; cursor:not-allowed; }
    .op-ctrl-icon { font-size:26px; flex-shrink:0; }
    .op-ctrl-text { display:flex; flex-direction:column; }
    .op-ctrl-name { font-size:16px; font-weight:800; line-height:1.2; }
    .op-ctrl-desc { font-size:12px; color:var(--muted); margin-top:2px; font-weight:400; }

    /* Individual button styles */
    .op-ctrl-start    { border-color:rgba(0,230,118,0.5); background:rgba(0,230,118,0.05); }
    .op-ctrl-start .op-ctrl-name { color:var(--green); }
    .op-ctrl-start:hover { background:rgba(0,230,118,0.1); border-color:var(--green); }

    .op-ctrl-stop     { border-color:rgba(64,196,255,0.4); }
    .op-ctrl-stop .op-ctrl-name { color:var(--blue); }
    .op-ctrl-stop:hover { background:rgba(64,196,255,0.08); border-color:var(--blue); }

    .op-ctrl-emergency { border-color:rgba(255,23,68,0.35); }
    .op-ctrl-emergency .op-ctrl-name { color:var(--red); }
    .op-ctrl-emergency:hover { background:rgba(255,23,68,0.08); border-color:var(--red); }

    .op-ctrl-nopat    { border-color:rgba(255,214,0,0.35); }
    .op-ctrl-nopat .op-ctrl-name { color:var(--yellow); }
    .op-ctrl-nopat:hover { background:rgba(255,214,0,0.08); border-color:var(--yellow); }

    .op-ctrl-end      { border-color:rgba(255,23,68,0.25); }
    .op-ctrl-end .op-ctrl-name { color:var(--red); }
    .op-ctrl-end:hover { background:rgba(255,23,68,0.08); border-color:var(--red); }

    /* Active state — when button is currently selected */
    .op-ctrl-active { background:rgba(128,128,128,0.1); }

    /* Stopped banner */
    .op-stopped-banner { background:rgba(64,196,255,0.07); border:1.5px solid rgba(64,196,255,0.3); border-radius:12px; padding:16px 20px; }
    .op-stopped-text { font-weight:700; font-size:15px; color:var(--blue); margin-bottom:4px; }
    .op-stopped-desc { font-size:13px; color:var(--muted); }

    /* ── NOT STARTED / START SERVING BANNER ── */
    .op-start-banner {
      background:rgba(158,158,158,0.07); border:2px solid rgba(158,158,158,0.3);
      border-radius:var(--radius); padding:24px 28px;
      display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap;
    }
    .op-start-title { font-family:var(--font-display); font-size:18px; font-weight:700; margin-bottom:6px; color:var(--text); }
    .op-start-desc  { font-size:13px; color:var(--muted); max-width:380px; }
    .btn-start-serving {
      background:var(--green); color:#000; font-weight:800;
      padding:16px 32px; border-radius:14px; font-size:16px;
      white-space:nowrap; flex-shrink:0;
      box-shadow:0 6px 24px rgba(0,230,118,0.3);
      transition:all .2s;
    }
    .btn-start-serving:hover { background:#00ff87; transform:translateY(-2px); box-shadow:0 10px 32px rgba(0,230,118,0.45); }

    /* ── MY APPOINTMENTS HISTORY TAB ── */
    .hist-body { max-width:800px; margin:0 auto; padding:40px 24px 80px; }
    .hist-heading { font-family:var(--font-display); font-size:28px; font-weight:800; margin-bottom:8px; }
    .hist-sub { color:var(--muted); font-size:14px; margin-bottom:32px; }
    .hist-list { display:flex; flex-direction:column; gap:16px; }

    .hist-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:24px; transition:all .2s; }
    .hist-card-active { border-left:4px solid var(--green); }
    .hist-card-ended  { border-left:4px solid var(--bg3); opacity:.85; }

    .hist-card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:20px; flex-wrap:wrap; }
    .hist-card-title { font-family:var(--font-display); font-size:18px; font-weight:700; margin-bottom:4px; }
    .hist-card-meta  { font-size:13px; color:var(--muted); }

    .hist-badge-active { background:rgba(0,230,118,0.12); color:var(--green); padding:5px 14px; border-radius:100px; font-size:13px; font-weight:700; white-space:nowrap; flex-shrink:0; }
    .hist-badge-ended  { background:var(--bg3); color:var(--muted); padding:5px 14px; border-radius:100px; font-size:13px; font-weight:600; white-space:nowrap; flex-shrink:0; }

    .hist-card-stats { display:flex; gap:24px; flex-wrap:wrap; margin-bottom:16px; }
    .hist-stat { text-align:center; }
    .hist-stat-val { font-family:var(--font-display); font-size:28px; font-weight:800; line-height:1; }
    .hist-stat-lbl { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-top:4px; }

    .hist-card-actions { padding-top:16px; border-top:1px solid var(--border); }
    .hist-loading { text-align:center; padding:60px 24px; color:var(--muted); }
    .hist-loader { width:36px; height:36px; border:3px solid var(--bg3); border-top-color:var(--green); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to{ transform:rotate(360deg); } }

    /* ── DEBUG ROW ── */
    .op-debug-row { display:flex; align-items:center; gap:10px; background:var(--bg3); border-radius:10px; padding:10px 16px; font-size:12px; flex-wrap:wrap; }
    .op-debug-label { color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
    .op-debug-val { color:var(--text); font-family:monospace; font-size:11px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .op-debug-test { background:var(--bg2); color:var(--muted); border:1px solid var(--border); padding:5px 12px; border-radius:8px; font-size:12px; flex-shrink:0; }
    .op-debug-test:hover { color:var(--green); border-color:var(--green); }

    /* ── TOKEN COOLDOWN ── */
    .token-cooldown-row {
      align-items:center; gap:10px; margin-top:12px;
      background:rgba(255,214,0,0.07); border:1px solid rgba(255,214,0,0.2);
      border-radius:10px; padding:10px 18px; font-size:14px; color:#ffe082;
      animation: fadeup .2s ease;
    }
    .cd-icon { font-size:18px; }
    .token-cooldown-row strong { font-family:var(--font-display); font-size:16px; }

    /* ── WAITLESS ID BANNER (home page after login) ── */
    .wl-id-banner {
      display:flex; align-items:center; flex-wrap:wrap; gap:10px;
      background:rgba(0,230,118,0.07); border:1.5px solid rgba(0,230,118,0.25);
      border-radius:14px; padding:14px 20px; margin:24px auto 0;
      max-width:520px;
    }
    .wl-id-label {
      font-size:12px; text-transform:uppercase; letter-spacing:1px;
      color:var(--muted); font-weight:600; flex-shrink:0;
    }
    .wl-id-value {
      font-family:var(--font-display); font-size:22px; font-weight:800;
      color:var(--green); letter-spacing:1px; flex-shrink:0;
    }
    .wl-id-copy {
      background:var(--bg3); color:var(--muted); border:1px solid var(--border);
      padding:6px 14px; border-radius:8px; font-size:13px; cursor:pointer; flex-shrink:0;
      transition:all .18s;
    }
    .wl-id-copy:hover { color:var(--green); border-color:var(--green); }
    .wl-id-note {
      font-size:12px; color:var(--muted); width:100%;
    }

    /* ── NAV WL ID chip ── */
    .nav-wl-id {
      font-family:var(--font-display); font-size:12px; font-weight:800;
      color:var(--green); background:rgba(0,230,118,0.1);
      padding:3px 10px; border-radius:100px; letter-spacing:.5px;
      border:1px solid rgba(0,230,118,0.25); flex-shrink:0;
    }

    /* ── PUBLIC BOARD SEARCH PANEL ── */
    .pub-search-panel {
      display:flex; flex-direction:column; gap:10px;
      background:var(--bg2); border:1px solid var(--border);
      border-radius:var(--radius); padding:18px 16px; margin-bottom:24px;
    }
    .pub-search-row {
      display:flex; gap:10px; align-items:center;
    }
    .btn-gps-search {
      background:var(--bg3); color:var(--text); font-weight:600;
      padding:0 16px; border-radius:10px; border:1.5px solid var(--border);
      font-size:13px; white-space:nowrap; height:46px; flex-shrink:0;
      transition:all .18s; cursor:pointer; font-family:var(--font-body);
    }
    .btn-gps-search:hover { border-color:var(--green); color:var(--green); }
    .btn-gps-search:disabled { opacity:.5; cursor:not-allowed; }
    .btn-clear-all {
      background:transparent; color:var(--muted); font-size:13px;
      padding:6px 0; border:none; cursor:pointer; text-align:left;
      font-family:var(--font-body); transition:color .18s;
    }
    .btn-clear-all:hover { color:var(--red); }

    /* ── LOCATION IN CREATE FORM ── */
    .loc-input-wrap {
      display:flex; gap:10px; align-items:center;
    }
    .loc-input-wrap .inp { flex:1; }
    .btn-loc-gps {
      background:var(--bg3); color:var(--text); font-weight:600;
      padding:12px 14px; border-radius:10px; border:1.5px solid var(--border);
      font-size:13px; white-space:nowrap; flex-shrink:0; cursor:pointer;
      font-family:var(--font-body); transition:all .18s;
    }
    .btn-loc-gps:hover { border-color:var(--green); color:var(--green); }
    .btn-loc-gps:disabled { opacity:.5; cursor:not-allowed; }
    .loc-status {
      display:block; font-size:12px; margin-top:6px; min-height:16px;
    }

    /* ── LOCATION ON PUB CARD ── */
    .pub-location {
      font-size:12px; color:var(--muted); margin-bottom:4px;
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }

    /* ════════════════════════════════════════════════════
       PROFILE PAGE CSS
    ════════════════════════════════════════════════════ */
    .prof-body { max-width:640px; margin:0 auto; padding:0 0 80px; }

    /* Cover */
    .prof-cover { position:relative; height:120px; }
    .prof-cover-bg { height:100%; background:linear-gradient(135deg,#0d1f14,#0a1a2e); }
    .prof-avatar-wrap { position:absolute; bottom:-36px; left:20px; }
    .prof-avatar { width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid var(--bg); background:var(--bg3); }

    /* Info card */
    .prof-info-card { background:var(--bg2); border:1px solid var(--border); border-radius:0 0 var(--radius) var(--radius); padding:52px 20px 20px; margin-bottom:16px; }
    .prof-info-top { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
    .prof-name { font-family:var(--font-display); font-size:22px; font-weight:800; margin-bottom:4px; }
    .prof-clinic { font-size:14px; color:var(--text); font-weight:600; margin-bottom:2px; }
    .prof-spec { font-size:13px; color:var(--muted); margin-bottom:2px; }
    .prof-loc-txt { font-size:13px; color:var(--muted); margin-bottom:6px; }
    .prof-wl-id { font-family:var(--font-display); font-size:13px; font-weight:700; color:var(--green); background:rgba(0,230,118,0.1); display:inline-block; padding:2px 10px; border-radius:100px; border:1px solid rgba(0,230,118,0.2); }
    .prof-stats { display:flex; gap:28px; }
    .prof-stat-val { font-family:var(--font-display); font-size:22px; font-weight:800; }
    .prof-stat-lbl { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-top:2px; }

    /* Follow / Edit buttons */
    .prof-actions { flex-shrink:0; }
    .btn-follow { background:var(--green); color:#000; font-weight:800; padding:10px 20px; border-radius:10px; font-size:14px; border:none; cursor:pointer; transition:all .18s; }
    .btn-follow:hover { background:#00ff87; }
    .btn-following { background:var(--bg3); color:var(--text); border:1.5px solid var(--border); }
    .btn-following:hover { border-color:var(--red); color:var(--red); }
    .btn-edit-profile { background:var(--bg3); color:var(--text); font-weight:600; padding:10px 18px; border-radius:10px; font-size:14px; border:1.5px solid var(--border); cursor:pointer; transition:all .18s; }
    .btn-edit-profile:hover { border-color:var(--green); color:var(--green); }

    /* Appointments section on profile */
    .prof-apts-section { padding:0 16px; }
    .prof-section-title { font-family:var(--font-display); font-size:16px; font-weight:700; margin-bottom:14px; }
    .prof-apts-list { display:flex; flex-direction:column; gap:10px; }
    .prof-apt-card { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:16px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; transition:all .18s; }
    .prof-apt-card:hover { border-color:var(--green); transform:translateY(-1px); }
    .prof-apt-title { font-weight:700; font-size:15px; margin-bottom:4px; }
    .prof-apt-meta { font-size:13px; color:var(--muted); }
    .prof-apt-num { font-family:var(--font-display); font-size:32px; font-weight:800; line-height:1; }
    .prof-apt-lbl { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; text-align:center; }
    .prof-empty { text-align:center; padding:40px 20px; color:var(--muted); }
    .prof-empty span { font-size:40px; display:block; margin-bottom:12px; }
    .prof-empty p { font-size:14px; line-height:1.7; }

    /* ════════════════════════════════════════════════════
       EDIT PROFILE PAGE CSS
    ════════════════════════════════════════════════════ */
    .edit-prof-body { max-width:560px; margin:0 auto; padding:32px 16px 80px; }
    .edit-prof-heading { font-family:var(--font-display); font-size:26px; font-weight:800; margin-bottom:24px; }
    .edit-prof-avatar-row { display:flex; align-items:center; gap:16px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:24px; }
    .edit-prof-avatar { width:60px; height:60px; border-radius:50%; object-fit:cover; background:var(--bg3); flex-shrink:0; }
    .edit-prof-form { display:flex; flex-direction:column; gap:18px; margin-bottom:28px; }

    /* ════════════════════════════════════════════════════
       FEED PAGE CSS
    ════════════════════════════════════════════════════ */
    .feed-body { max-width:640px; margin:0 auto; padding:28px 16px 80px; }

<body>
  <div id="root"></div>

  <script>
  window.addEventListener("DOMContentLoaded", function () {

    /* ── Firebase Config ─────────────────────────────── */
    const firebaseConfig = {
      apiKey:            "AIzaSyBxyZM9hNKDgZ9ZiKmTqVLjy1PA3m0KH24",
      authDomain:        "waitless-26f3c.firebaseapp.com",
      databaseURL:       "https://waitless-26f3c-default-rtdb.firebaseio.com",
      projectId:         "waitless-26f3c",
      storageBucket:     "waitless-26f3c.firebasestorage.app",
      messagingSenderId: "462985909194",
      appId:             "1:462985909194:web:c740777f907f5a6be0f533"
    };
    const BACKEND = "https://waitless-backend-7bv4.onrender.com";

    firebase.initializeApp(firebaseConfig);
    const auth     = firebase.auth();
    const db       = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    /* ── App State ───────────────────────────────────── */
    let currentUser     = null;
    let currentView     = "splash";
    let allAppointments = [];
    let myAppointment   = null;
    let selectedApt     = null;
    let aptUnsub        = null;
    // searchQuery now declared above with other search state
    let activeTab         = "my-session"; // "my-session" | "operating" | "history"
    let myAllAppointments = []; // all appointments by this doctor (active + past)
    let userWaitlessId    = "";  // permanent WL-XXXXX id for this user/device
    let searchAptId       = "";  // appointment id filter on public board
    let searchLocation    = "";  // location filter on public board
    let searchQuery       = "";  // keep for compat
    let myProfile         = null; // logged-in user's profile data
    let viewingProfile    = null; // profile being viewed publicly
    let followingIds      = [];   // list of doctor uids this device follows (localStorage)
    let feedAppointments  = [];   // live appointments from followed doctors

    const STATUS = {
      normal:    { label:"Serving Patients", color:"#00e676", icon:"🟢", desc:"Queue running normally"   },
      emergency: { label:"Emergency Stop",   color:"#ff1744", icon:"🔴", desc:"Pause queue immediately"  },
      nopatient: { label:"No Patients",      color:"#ffd600", icon:"🟡", desc:"Queue is currently empty" },
      break:     { label:"Break / Away",     color:"#40c4ff", icon:"🔵", desc:"Doctor stepped away"      },
    };

    /* ── Router ──────────────────────────────────────── */
    function go(view, data) {
      currentView = view;
      if (data !== undefined) {
        if (view === "live")    selectedApt     = data;
        if (view === "profile") viewingProfile  = data;
      }
      if (view !== "public") { searchQuery = ""; }
      paint();
    }

    function paint() {
      const root = document.getElementById("root");
      switch (currentView) {
        case "splash":       root.innerHTML = splashHTML();                        break;
        case "home":         root.innerHTML = homeHTML();        bindHome();       break;
        case "doctor":       root.innerHTML = doctorHTML();      bindDoctor();     break;
        case "public":       root.innerHTML = publicHTML();      bindPublic();     break;
        case "live":         root.innerHTML = liveHTML();        bindLive();       break;
        case "profile":      root.innerHTML = profileHTML();     bindProfile();    break;
        case "edit-profile": root.innerHTML = editProfileHTML(); bindEditProfile();break;
        case "feed":         root.innerHTML = feedHTML();        bindFeed();       break;
      }
    }

    /* ── Toast ───────────────────────────────────────── */
    function toast(msg, ms) {
      ms = ms || 2800;
      var old = document.querySelector(".toast");
      if (old) old.remove();
      var t = document.createElement("div");
      t.className = "toast";
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(function(){ t.remove(); }, ms);
    }

    /* ── Waitless ID (permanent per user/device) ────────── */
    // Each user gets a permanent WL-XXXXX id stored in localStorage
    // tied to their Firebase UID so same id across devices after login
    function getOrCreateWaitlessId(uid) {
      var key  = "wl_id_" + uid;
      var existing = localStorage.getItem(key);
      if (existing) return existing;
      // Generate new id: WL- + 5 random digits
      var num = Math.floor(10000 + Math.random() * 90000);
      var newId = "WL-" + num;
      localStorage.setItem(key, newId);
      return newId;
    }

    /* ── Follow system (localStorage, no login needed) ─── */
    function loadFollowing() {
      try {
        var raw = localStorage.getItem("wl_following") || "[]";
        followingIds = JSON.parse(raw);
      } catch(e) { followingIds = []; }
    }
    function saveFollowing() {
      localStorage.setItem("wl_following", JSON.stringify(followingIds));
    }
    function isFollowing(uid) {
      return followingIds.indexOf(uid) !== -1;
    }
    function toggleFollow(uid) {
      if (isFollowing(uid)) {
        followingIds = followingIds.filter(function(id){ return id !== uid; });
        // Decrement follower count in Firestore
        db.collection("users").doc(uid).update({
          followerCount: firebase.firestore.FieldValue.increment(-1)
        }).catch(function(){});
        toast("Unfollowed");
      } else {
        followingIds.push(uid);
        // Increment follower count in Firestore
        db.collection("users").doc(uid).update({
          followerCount: firebase.firestore.FieldValue.increment(1)
        }).catch(function(){});
        toast("✅ Following!");
      }
      saveFollowing();
    }

    /* ── Profile Firestore helpers ───────────────────── */
    async function loadProfile(uid) {
      var snap = await db.collection("users").doc(uid).get();
      if (snap.exists) return Object.assign({uid:uid}, snap.data());
      return null;
    }

    async function saveMyProfile(data) {
      var uid = currentUser.uid;
      await db.collection("users").doc(uid).set(data, {merge:true});
      myProfile = Object.assign(myProfile || {uid:uid}, data);
    }

    async function ensureMyProfile() {
      if (!currentUser) return;
      var uid  = currentUser.uid;
      var snap = await db.collection("users").doc(uid).get();
      if (!snap.exists) {
        // Auto-create profile on first login
        var prof = {
          uid:           uid,
          name:          currentUser.displayName || "User",
          photo:         currentUser.photoURL    || "",
          clinicName:    "",
          specialization:"",
          location:      "",
          waitlessId:    getOrCreateWaitlessId(uid),
          followerCount: 0,
          createdAt:     firebase.firestore.FieldValue.serverTimestamp(),
        };
        await db.collection("users").doc(uid).set(prof);
        myProfile = prof;
      } else {
        myProfile = Object.assign({uid:uid}, snap.data());
      }
    }

    /* ── Feed: live listener for followed doctors ─────── */
    var feedUnsub = null;
    function startFeedListener() {
      if (feedUnsub) { feedUnsub(); feedUnsub = null; }
      if (!followingIds.length) { feedAppointments = []; return; }
      // Firestore "in" query supports max 10 items
      var ids = followingIds.slice(0, 10);
      feedUnsub = db.collection("appointments")
        .where("active","==",true)
        .where("doctorId","in", ids)
        .onSnapshot(function(snap){
          feedAppointments = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
          if (currentView === "feed") {
            var el = eid("feed-list");
            if (el) { el.innerHTML = feedListHTML(); reBindFeedCards(); }
          }
        }, function(err){ console.error(err); });
    }

    /* ── Auth ────────────────────────────────────────── */
    async function login() {
      try { await auth.signInWithPopup(provider); }
      catch(e) { toast("Login failed: " + e.message); }
    }
    async function logout() {
      await auth.signOut();
      myAppointment = null;
      myAllAppointments = [];
      activeTab = "my-session";
      userWaitlessId = "";
      if (histUnsub) { histUnsub(); histUnsub = null; }
      go("home");
    }

    /* ── Global Firestore listener (all active apts) ─── */
    db.collection("appointments").where("active","==",true)
      .onSnapshot(function(snap) {
        allAppointments = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });

        if (currentView === "live" && selectedApt) {
          var up = allAppointments.find(function(a){ return a.id === selectedApt.id; });
          if (up) { selectedApt = up; patchLive(); }
          else    { go("public"); }
        }
        if (currentView === "home") {
          var el = eid("preview-section");
          if (el) { el.outerHTML = previewSectionHTML(); reBindClinicCards(); }
        }
        if (currentView === "public") {
          var el2 = eid("board-grid");
          if (el2) { el2.innerHTML = pubCardsInner(); reBindPubCards(); }
        }
      }, function(err){ console.error(err); });

    /* ── Doctor session listener ─────────────────────── */
    var histUnsub = null;
    function startDoctorWatch(uid) {
      if (aptUnsub) aptUnsub();
      if (histUnsub) histUnsub();

      // Active session listener
      aptUnsub = db.collection("appointments")
        .where("doctorId","==",uid).where("active","==",true)
        .onSnapshot(function(snap) {
          myAppointment = snap.empty
            ? null
            : Object.assign({id:snap.docs[0].id}, snap.docs[0].data());
          if (currentView === "doctor") patchDoctorTabs();
        }, function(err){ console.error(err); });

      // All appointments listener (active + past) for history tab
      histUnsub = db.collection("appointments")
        .where("doctorId","==",uid)
        .orderBy("createdAt","desc")
        .onSnapshot(function(snap) {
          myAllAppointments = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
          histLoaded = true;
          if (currentView === "doctor" && activeTab === "history") {
            var tc3 = eid("tc-history");
            if (tc3) { tc3.innerHTML = historyTabHTML(); bindHistoryContent(); }
          }
        }, function(err){
          // createdAt index may not exist yet — fallback without ordering
          histUnsub = db.collection("appointments")
            .where("doctorId","==",uid)
            .onSnapshot(function(snap2) {
              myAllAppointments = snap2.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); })
                .sort(function(a,b){ return ((b.createdAt&&b.createdAt.seconds)||0) - ((a.createdAt&&a.createdAt.seconds)||0); });
              histLoaded = true;
              if (currentView === "doctor" && activeTab === "history") {
                var tc3b = eid("tc-history");
                if (tc3b) { tc3b.innerHTML = historyTabHTML(); bindHistoryContent(); }
              }
            });
        });
    }

    /* ── API helper ──────────────────────────────────── */
    async function api(method, path, body) {
      var token = null;
      try {
        token = currentUser ? await currentUser.getIdToken(true) : null;
      } catch(tokenErr) {
        throw new Error("Auth token error: " + tokenErr.message);
      }

      var res;
      try {
        res = await fetch(BACKEND + path, {
          method: method,
          headers: Object.assign(
            {"Content-Type":"application/json"},
            token ? {Authorization:"Bearer "+token} : {}
          ),
          body: body ? JSON.stringify(body) : undefined,
        });
      } catch(networkErr) {
        throw new Error("Network error — backend unreachable: " + networkErr.message);
      }

      if (!res.ok) {
        var errText = await res.text().catch(function(){ return res.statusText; });
        var errMsg = errText;
        try { errMsg = JSON.parse(errText).error || errText; } catch(e) {}
        console.error("API Error", method, path, res.status, errMsg);
        throw new Error("(" + res.status + ") " + errMsg);
      }
      return res.json();
    }

    /* ── Actions ─────────────────────────────────────── */
    // GPS reverse geocode using open-source Nominatim (no API key needed)
    async function getLocationName() {
      return new Promise(function(resolve) {
        if (!navigator.geolocation) { resolve(""); return; }
        var ls = eid("loc-status");
        if (ls) { ls.textContent = "📍 Getting location…"; ls.style.color="var(--muted)"; }
        navigator.geolocation.getCurrentPosition(
          async function(pos) {
            try {
              var lat = pos.coords.latitude, lng = pos.coords.longitude;
              var url = "https://nominatim.openstreetmap.org/reverse?lat="+lat+"&lon="+lng+"&format=json";
              var res = await fetch(url, {headers:{"Accept-Language":"en"}});
              var data = await res.json();
              var addr = data.address || {};
              // Build city/area string
              var parts = [
                addr.suburb || addr.neighbourhood || addr.village || "",
                addr.city    || addr.town || addr.county || "",
                addr.state   || ""
              ].filter(Boolean);
              var locName = parts.slice(0,2).join(", ");
              if (ls) { ls.textContent = "✅ " + locName; ls.style.color="var(--green)"; }
              resolve(locName);
            } catch(e) {
              if (ls) { ls.textContent = "❌ Could not get location"; ls.style.color="var(--red)"; }
              resolve("");
            }
          },
          function() {
            if (ls) { ls.textContent = "❌ Location access denied"; ls.style.color="var(--red)"; }
            resolve("");
          },
          { timeout: 8000 }
        );
      });
    }

    async function createAppointment() {
      var title    = val("f-title").trim();
      var sched    = val("f-start");
      var tokens   = Math.min(Math.max(parseInt(val("f-tokens"))||20, 1), 500);
      var notes    = val("f-notes").trim();
      var location = val("f-location").trim();
      if (!title) { toast("Please enter a session title."); return; }

      var btn = eid("create-btn");
      btn.disabled = true;
      btn.textContent = "Starting…";

      try {
        var created = await api("POST", "/api/appointments", {
          title: title, startTime: sched, totalTokens: tokens,
          notes: notes, location: location,
          doctorWaitlessId: userWaitlessId
        });

        myAppointment = {
          id:              created.id,
          doctorId:        currentUser.uid,
          doctorName:      currentUser.displayName || "Doctor",
          doctorPhoto:     currentUser.photoURL || "",
          doctorWaitlessId: userWaitlessId,
          title:           title,
          startTime:       sched,
          totalTokens:     tokens,
          currentToken:    1,
          status:          "notstarted",
          instruction:     "",
          active:          true,
          notes:           notes,
          location:        location,
        };

        activeTab = "operating";
        paint();
        toast("✅ Session started!");
      } catch(e) {
        toast("❌ " + e.message);
        btn.disabled = false;
        btn.textContent = "🚀 Start Appointment Session";
      }
    }

    // ── Optimistic update: update UI instantly, sync to Firestore in background ──
    // This makes all buttons feel instant (0ms) instead of waiting 2-3s for Firestore
    function optimistic(fields) {
      if (!myAppointment) return;

      // 1. Apply change to local state immediately
      Object.assign(myAppointment, fields);

      // 2. Re-render the operating tab right now — no waiting
      patchDoctorTabs();

      // 3. Write to Firestore in the background (no await)
      db.collection("appointments").doc(myAppointment.id).update(fields)
        .catch(function(e) {
          // If Firestore write fails, show error — Firestore listener will auto-correct the UI
          toast("⚠️ Sync error: " + e.message);
        });
    }

    // Keep fsUpdate for operations that need confirmation (create, end session)
    async function fsUpdate(fields) {
      if (!myAppointment) return;
      try {
        await db.collection("appointments").doc(myAppointment.id).update(fields);
      } catch(e) {
        toast("❌ " + e.message);
        throw e;
      }
    }

    var tokenCooldown = false;
    var cooldownTimer = null;

    function startTokenCooldown() {
      tokenCooldown = true;
      var secs = 5;

      // Disable both buttons immediately
      var btnPrev = eid("op-prev");
      var btnNext = eid("op-next");
      var cdEl    = eid("token-cooldown");
      if (btnPrev) btnPrev.disabled = true;
      if (btnNext) btnNext.disabled = true;
      if (cdEl)    cdEl.style.display = "flex";

      // Countdown tick
      function tick() {
        var cdEl2 = eid("token-cooldown");
        var cdNum = eid("cooldown-num");
        if (cdNum) cdNum.textContent = "0:0" + secs;
        if (secs === 0) {
          tokenCooldown = false;
          // Re-enable buttons based on current state
          var p = eid("op-prev");
          var n = eid("op-next");
          var apt = myAppointment;
          if (p && apt) p.disabled = !apt || apt.status === "notstarted" || apt.currentToken <= 1;
          if (n && apt) n.disabled = !apt || apt.status === "notstarted" || apt.currentToken >= apt.totalTokens;
          if (cdEl2) cdEl2.style.display = "none";
          return;
        }
        secs--;
        cooldownTimer = setTimeout(tick, 1000);
      }
      tick();
    }

    // ── Token chime sound (Web Audio API — no external files needed) ────────────
    // A warm, soft but loud bell chime: main tone + harmonic overtone + gentle fade
    function playTokenChime() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();

        function makeNote(freq, startTime, duration, gainPeak) {
          // Oscillator — sine wave for softness
          var osc = ctx.createOscillator();
          osc.type = "sine";
          osc.frequency.setValueAtTime(freq, startTime);
          // Slight frequency drop for warmth (like a real bell)
          osc.frequency.exponentialRampToValueAtTime(freq * 0.98, startTime + duration);

          // Gain envelope — instant attack, long soft decay
          var gain = ctx.createGain();
          gain.gain.setValueAtTime(0, startTime);
          gain.gain.linearRampToValueAtTime(gainPeak, startTime + 0.01); // fast attack
          gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration); // soft decay

          // Soft compressor so it's loud but never harsh
          var comp = ctx.createDynamicsCompressor();
          comp.threshold.value = -18;
          comp.knee.value = 12;
          comp.ratio.value = 3;
          comp.attack.value = 0.003;
          comp.release.value = 0.4;

          osc.connect(gain);
          gain.connect(comp);
          comp.connect(ctx.destination);

          osc.start(startTime);
          osc.stop(startTime + duration);
        }

        var now = ctx.currentTime;

        // Main chime tone — E5 (659Hz), very loud
        makeNote(659, now,        1.8, 1.0);
        // Harmonic overtone — B5 (988Hz), slightly quieter
        makeNote(988, now,        1.4, 0.55);
        // Second chime — G5 (784Hz), after a tiny gap, softer
        makeNote(784, now + 0.18, 1.5, 0.65);
        // Deep undertone — E4 (330Hz), adds warmth
        makeNote(330, now,        1.2, 0.30);

        // Auto close context after sound finishes
        setTimeout(function(){ ctx.close(); }, 2200);
      } catch(e) {
        // Silently fail if browser blocks audio
      }
    }

    function nextToken() {
      if (!myAppointment || tokenCooldown) return;
      optimistic({
        currentToken: Math.min(myAppointment.currentToken + 1, myAppointment.totalTokens),
        status: "normal"
      });
      playTokenChime();
      startTokenCooldown();
    }

    function prevToken() {
      if (!myAppointment || tokenCooldown) return;
      optimistic({
        currentToken: Math.max(myAppointment.currentToken - 1, 1)
      });
      playTokenChime();
      startTokenCooldown();
    }

    function startServing() {
      if (!myAppointment) return;

    }

    function toggleStop() {
      if (!myAppointment) return;
      var newStatus = myAppointment.status === "break" ? "normal" : "break";
      optimistic({ status: newStatus });
    }

    function toggleEmergency() {
      if (!myAppointment) return;
      var newStatus = myAppointment.status === "emergency" ? "normal" : "emergency";

      var newStatus = myAppointment.status === "nopatient" ? "normal" : "nopatient";

      if (!myAppointment || !confirm("End this appointment session? Patients will no longer see it.")) return;
      try {
        await db.collection("appointments").doc(myAppointment.id).update({
          active: false,
          endedAt: firebase.firestore.FieldValue.serverTimestamp()

        toast("Session ended.");
        activeTab = "my-session";

      try {

      } catch(e) {}
      btn.disabled = false; btn.textContent = "Send";
    }

                 (a.doctorName||"").toLowerCase().includes(loc) ||
                 (a.title||"").toLowerCase().includes(loc);

      // Filter by Appointment ID (matches doctor's WL- id)

        list = list.filter(function(a){

    // GPS for public board search (Nominatim, no API key)
    async function getSearchLocationName() {
      return new Promise(function(resolve) {
        if (!navigator.geolocation) { resolve(""); return; }
        navigator.geolocation.getCurrentPosition(
          async function(pos) {
            try {
              var lat = pos.coords.latitude, lng = pos.coords.longitude;
              var url = "https://nominatim.openstreetmap.org/reverse?lat="+lat+"&lon="+lng+"&format=json";
              var res = await fetch(url, {headers:{"Accept-Language":"en"}});
              var data = await res.json();
              var addr = data.address || {};
              var city = addr.city || addr.town || addr.county || addr.suburb || "";
              resolve(city);
            } catch(e) { resolve(""); }
          },
          function(){ resolve(""); },
          {timeout:8000}
        );
      });
    }

        });
      });
    }

    /* ── Utilities ────────────────────────────────────── */
    function copyText(text) {
      if (navigator.clipboard) navigator.clipboard.writeText(text).catch(function(){ fallbackCopy(text); });
      else fallbackCopy(text);
    }
    function fallbackCopy(text) {
      var ta = document.createElement("textarea");
      ta.value = text; ta.style.position="fixed"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); ta.remove();
    }
    function x(s) {
      if (!s) return "";
      return String(s)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
    function val(id) { var e = eid(id); return e ? e.value : ""; }
    function eid(id) { return document.getElementById(id); }
