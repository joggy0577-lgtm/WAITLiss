              </div>
              ${apts.length ? `
                <div class="prof-apts-list">
                  ${apts.map(function(apt){
                    var m = STATUS[apt.status]||STATUS.normal;
                    return `
                      <div class="prof-apt-card" data-id="${apt.id}">
                        <div class="prof-apt-left">
                          <div class="prof-apt-title">${x(apt.title)}</div>
                          <div class="prof-apt-meta">
                            <span style="color:${m.color};font-weight:700">${m.icon} ${m.label}</span>
                            ${apt.location ? ` · 📍 ${x(apt.location)}` : ""}
                          </div>
                        </div>
                        <div class="prof-apt-token">
                          <div class="prof-apt-num" style="color:${m.color}">${apt.status==="notstarted"?"—":apt.currentToken}</div>
                          <div class="prof-apt-lbl">Token</div>
                        </div>
                      </div>`;
                  }).join("")}
                </div>
              ` : `
                <div class="prof-empty">
                  <span>📭</span>
                  <p>No active sessions right now.<br/>Follow to get notified when they go live.</p>
                </div>
              `}
            </div>

          </div>
        </div>`;
    }

    function bindProfile() {
      on("nav-back",    function(){ history.length>1 ? go(currentView==="profile"?"public":"home") : go("home"); });
      on("nav-logout",  logout);
      on("nav-feed",    function(){ go("feed"); });
      on("nav-my-profile", function(){ if(currentUser) go("profile", myProfile||{uid:currentUser.uid}); });
      on("prof-edit",   function(){ go("edit-profile"); });
      // QR Code button — only on own profile
      var qrBtn = eid("prof-qr");
      if (qrBtn) {
        qrBtn.addEventListener("click", function(){
          showQRModal(qrBtn.dataset.uid, qrBtn.dataset.name);
        });
      }
      var followBtn = eid("prof-follow");
      if (followBtn) {
        followBtn.addEventListener("click", function(){
          var uid = followBtn.dataset.uid;
          toggleFollow(uid);
          startFeedListener();
          // update button instantly
          var nowFollowing = isFollowing(uid);
          followBtn.textContent = nowFollowing ? "✅ Following" : "➕ Follow";
          followBtn.classList.toggle("btn-following", nowFollowing);
        });
      }
      // tap an appointment card to go live view
      document.querySelectorAll(".prof-apt-card[data-id]").forEach(function(c){
        c.addEventListener("click", function(){
          var found = allAppointments.find(function(a){ return a.id===c.dataset.id; });
          if (found) go("live", found);
        });
      });
    }

    /* ════════════════════════════════════════════════════
       EDIT PROFILE PAGE
    ════════════════════════════════════════════════════ */
    function editProfileHTML() {
      var prof = myProfile || {};
      return `
        <div class="public-board">
          ${navHTML({back:true, backLabel:"Profile"})}
          <div class="edit-prof-body">
            <div class="edit-prof-heading">Edit Profile</div>
            <div class="edit-prof-avatar-row">
              <img src="${x(prof.photo||currentUser&&currentUser.photoURL||"")}" class="edit-prof-avatar" alt=""
                onerror="this.style.background='var(--bg3)'" />
              <div>
                <div style="font-weight:600;font-size:15px">${x(prof.name||"")}</div>
                <div style="font-size:13px;color:var(--muted)">Photo synced from Google</div>
              </div>
            </div>
            <div class="edit-prof-form">
              <label>
                Display Name
                <input class="inp" id="ep-name" value="${x(prof.name||"")}" placeholder="Your full name" />
              </label>
              <label>
                Clinic Name
                <input class="inp" id="ep-clinic" value="${x(prof.clinicName||"")}" placeholder="e.g. City Heart Clinic" />
              </label>
              <label>
                Specialization
                <input class="inp" id="ep-spec" value="${x(prof.specialization||"")}" placeholder="e.g. Cardiologist, Dentist, GP" />
              </label>
              <label>
                Clinic Location
                <div class="loc-input-wrap">
                  <input class="inp" id="ep-location" value="${x(prof.location||"")}" placeholder="e.g. Andheri West, Mumbai" />
                  <button class="btn-loc-gps" id="ep-loc-gps" type="button">📍 Use GPS</button>
                </div>
                <span class="loc-status" id="ep-loc-status"></span>
              </label>
            </div>
            <div style="display:flex;gap:12px;margin-top:8px">
              <button class="btn-primary btn-lg" id="ep-save" style="flex:1">💾 Save Profile</button>
              <button class="btn-outline" id="ep-cancel">Cancel</button>
            </div>
          </div>
        </div>`;
    }

    function bindEditProfile() {
      on("nav-back",    function(){ go("profile", myProfile); });
      on("nav-logout",  logout);
      on("ep-cancel",   function(){ go("profile", myProfile); });
      on("ep-loc-gps", async function(){
        var btn = eid("ep-loc-gps");
        var ls  = eid("ep-loc-status");
        btn.disabled=true; btn.textContent="📍 Locating…";
        if (ls) { ls.textContent="Getting location…"; ls.style.color="var(--muted)"; }
        var name = await getLocationName(ls);
        if (name) { var inp=eid("ep-location"); if(inp) inp.value=name; }
        btn.disabled=false; btn.textContent="📍 Use GPS";
      });
      on("ep-save", async function(){
        if (!currentUser) return;
        var btn = eid("ep-save");
        btn.disabled=true; btn.textContent="Saving…";
        var data = {
          name:           val("ep-name").trim()   || currentUser.displayName || "User",
          photo:          currentUser.photoURL    || "",
          clinicName:     val("ep-clinic").trim(),
          specialization: val("ep-spec").trim(),
          location:       val("ep-location").trim(),
          waitlessId:     userWaitlessId,
        };
        try {
          await saveMyProfile(data);
          toast("✅ Profile saved!");
          go("profile", myProfile);
        } catch(e) {
          toast("❌ " + e.message);
          btn.disabled=false; btn.textContent="💾 Save Profile";
        }
      });
    }

    /* ════════════════════════════════════════════════════
       FEED PAGE (followed doctors)
    ════════════════════════════════════════════════════ */
    function feedHTML() {
      loadFollowing();
      startFeedListener();
      return `
        <div class="public-board">
          ${navHTML({back:true, backLabel:"Home"})}
          <div class="feed-body">
            <div class="feed-heading">📋 Following</div>
            <div class="feed-sub">${followingIds.length} doctor${followingIds.length===1?"":"s"} followed · updates live</div>
            <div id="feed-list">${feedListHTML()}</div>
          </div>
        </div>`;
    }

    function feedListHTML() {
      if (!followingIds.length) {
        return `
          <div class="prof-empty" style="padding:60px 20px">
            <span style="font-size:52px">👥</span>
            <p>You're not following anyone yet.<br/>
            Visit a doctor's profile and tap <strong>➕ Follow</strong>.</p>
            <button class="btn-primary" id="feed-go-public" style="margin-top:16px">Browse Clinics</button>
          </div>`;
      }
      // Show cards for all followed doctor IDs
      return followingIds.map(function(uid){
        var apts = feedAppointments.filter(function(a){ return a.doctorId===uid; });
        return feedDoctorCardHTML(uid, apts);
      }).join("");
    }

    function feedDoctorCardHTML(uid, apts) {
      // Try to get profile info from active appointment data
      var apt      = apts[0] || null;
      var name     = apt ? apt.doctorName  : "Doctor";
      var photo    = apt ? apt.doctorPhoto : "";
      var hasLive  = apts.length > 0;
      var m        = apt ? (STATUS[apt.status]||STATUS.normal) : null;

      return `
        <div class="feed-card" data-uid="${x(uid)}">
          <div class="feed-card-top">
            <img src="${x(photo)}" class="feed-avatar" alt=""
              onerror="this.style.background='var(--bg3)';this.src=''" />
            <div class="feed-card-info">
              <div class="feed-doctor-name">${x(name)}</div>
              <div class="feed-status ${hasLive?"feed-live":"feed-offline"}">
                ${hasLive ? m.icon+" "+m.label : "⚫ No active session"}
              </div>
            </div>
            <div class="feed-card-actions">
              <button class="btn-ghost feed-view-profile" data-uid="${x(uid)}">👤 Profile</button>
              <button class="btn-unfollow" data-uid="${x(uid)}">Unfollow</button>
            </div>
          </div>
          ${hasLive ? `
            <div class="feed-apts">
              ${apts.map(function(a){
                var mm = STATUS[a.status]||STATUS.normal;
                return `
                  <div class="feed-apt-row" data-id="${a.id}">
                    <div class="feed-apt-title">${x(a.title)}</div>
                    <div class="feed-apt-token" style="color:${mm.color}">
                      ${a.status==="notstarted"?"—":a.currentToken}
                    </div>
                  </div>`;
              }).join("")}
            </div>
          ` : ""}
        </div>`;
    }

    function bindFeed() {
      on("nav-back",       function(){ go("home"); });
      on("nav-logout",     logout);
      on("nav-feed",       function(){ go("feed"); });
      on("nav-my-profile", function(){ if(currentUser) go("profile", myProfile); });
      on("feed-go-public", function(){ go("public"); });
      reBindFeedCards();
    }

    function reBindFeedCards() {
      // Unfollow buttons
      document.querySelectorAll(".btn-unfollow[data-uid]").forEach(function(btn){
        btn.addEventListener("click", function(){
          toggleFollow(btn.dataset.uid);
          startFeedListener();
          var el = eid("feed-list");
          if (el) { el.innerHTML = feedListHTML(); reBindFeedCards(); }
        });
      });
      // View profile
      document.querySelectorAll(".feed-view-profile[data-uid]").forEach(function(btn){
        btn.addEventListener("click", async function(){
          var prof = await loadProfile(btn.dataset.uid);
          if (prof) go("profile", prof);
          else toast("Profile not found");
        });
      });
      // Tap appointment row
      document.querySelectorAll(".feed-apt-row[data-id]").forEach(function(c){
        c.addEventListener("click", function(){
          var found = allAppointments.find(function(a){ return a.id===c.dataset.id; });
          if (found) go("live", found);
        });
      });
    }

    /* ── Also add profile link to public board cards ─── */

    /* ════════════════════════════════════════════════════
       QR CODE — generates profile URL QR, shows modal, downloads PNG
    ════════════════════════════════════════════════════ */
    function getProfileURL(uid) {
      // Build absolute URL with ?profile=UID so QR scan lands on that doctor's page
      var base = window.location.href.split("?")[0].split("#")[0];
      return base + "?profile=" + uid;
    }

    function showQRModal(uid, doctorName) {
      // Remove any existing modal
      var old = document.getElementById("qr-modal-overlay");
      if (old) old.remove();

      var profileUrl = getProfileURL(uid);

      // Create overlay
      var overlay = document.createElement("div");
      overlay.id = "qr-modal-overlay";
      overlay.className = "qr-overlay";
      overlay.innerHTML = `
        <div class="qr-modal">
          <div class="qr-modal-header">
            <div class="qr-modal-title">📲 Scan to Visit Profile</div>
            <button class="qr-close-btn" id="qr-close">✕</button>
          </div>
          <div class="qr-doctor-name">${x(doctorName)}</div>
          <div class="qr-code-wrap" id="qr-code-container"></div>
          <div class="qr-url-text">${x(profileUrl)}</div>
          <div class="qr-btn-row">
            <button class="btn-primary qr-download-btn" id="qr-download-btn">
              ⬇️ Download QR Code
            </button>
            <button class="btn-outline qr-copy-btn" id="qr-copy-link">
              🔗 Copy Link
            </button>
          </div>
          <div class="qr-hint">Patients scan this with their phone camera to open your profile</div>
        </div>`;

      document.body.appendChild(overlay);

      // Generate QR code into the container
      var container = document.getElementById("qr-code-container");
      var qr = new QRCode(container, {
        text:          profileUrl,
        width:         220,
        height:        220,
        colorDark:     "#ffffff",
        colorLight:    "#111318",
        correctLevel:  QRCode.CorrectLevel.H,
      });

      // Close button
      document.getElementById("qr-close").addEventListener("click", function(){
        overlay.remove();
      });
      // Close on backdrop click
      overlay.addEventListener("click", function(e){
        if (e.target === overlay) overlay.remove();
      });

      // Download button
      document.getElementById("qr-download-btn").addEventListener("click", function(){
        // Wait a tick for QR canvas to render
        setTimeout(function(){
          var canvas = container.querySelector("canvas");
          if (!canvas) { toast("QR not ready yet, try again."); return; }

          // Create a new canvas with padding + label for nice download
          var pad    = 24;
          var label  = doctorName + " — Waitless";
          var final  = document.createElement("canvas");
          var ctx    = final.getContext("2d");
          final.width  = canvas.width  + pad * 2;
          final.height = canvas.height + pad * 2 + 36;

          // Dark background
          ctx.fillStyle = "#111318";
          ctx.fillRect(0, 0, final.width, final.height);

          // QR image
          ctx.drawImage(canvas, pad, pad);

          // Label below QR
          ctx.fillStyle = "#00e676";
          ctx.font      = "bold 15px sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(label, final.width / 2, canvas.height + pad + 22);

          // Trigger download
          var link      = document.createElement("a");
          link.download = "waitless-qr-" + (doctorName||"profile").replace(/\s+/g,"-").toLowerCase() + ".png";
          link.href     = final.toDataURL("image/png");
          link.click();
          toast("✅ QR Code downloaded!");
        }, 100);
      });

      // Copy link button
      document.getElementById("qr-copy-link").addEventListener("click", function(){
        copyText(profileUrl);
        toast("🔗 Profile link copied!");
      });
    }

    /* ── Handle ?profile=UID in URL on page load ─────── */
    function checkURLParams() {
      var params = new URLSearchParams(window.location.search);
      var profileUID = params.get("profile");
      if (profileUID) {
        // Load that doctor's profile and navigate to it
        loadProfile(profileUID).then(function(prof){
          if (prof) {
            go("profile", prof);
          } else {
            // Profile doesn't exist yet — show a placeholder
            go("profile", { uid: profileUID, name: "Doctor", waitlessId: "", followerCount: 0 });
          }
        }).catch(function(){
          go("home");
        });
      }
    }

    /* ── Boot ─────────────────────────────────────────── */
    loadFollowing();  // load followed IDs from localStorage on startup
    startFeedListener(); // start listening for feed appointments
    paint();
    checkURLParams(); // handle ?profile=UID from QR code scans

    auth.onAuthStateChanged(async function(user) {
      currentUser = user;
      if (user) {
        userWaitlessId = getOrCreateWaitlessId(user.uid);
        await ensureMyProfile();
        startDoctorWatch(user.uid);
      } else {
        userWaitlessId    = "";
        myProfile         = null;
        if (aptUnsub)  { aptUnsub();  aptUnsub  = null; }
        if (histUnsub) { histUnsub(); histUnsub = null; }
        if (feedUnsub) { feedUnsub(); feedUnsub = null; }
        myAppointment     = null;
        myAllAppointments = [];
        histLoaded        = false;
      }
      if (currentView === "splash") go("home");
      else paint();
    });

  }); // end DOMContentLoaded
  </script>
